name: Bug report
about: Report a problem with provisioning or docs
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      placeholder: Clear description of the issue
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true

  - type: input
    id: proxmox
    attributes:
      label: Proxmox version
      placeholder: e.g. 8.3

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs/output
      render: shell
